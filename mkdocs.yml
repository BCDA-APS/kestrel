site_name: Kestrel
site_url: https://bcda-aps.github.io/kestrel/
site_description: Browser-based visualization tool for Bluesky/Tiled datasets
site_author: BCDA, Advanced Photon Source, Argonne National Laboratory
repo_url: https://github.com/BCDA-APS/kestrel
repo_name: BCDA-APS/kestrel

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
    - Getting Started: usage/getting-started.md
    - Plotting: usage/plotting.md
    - Grid Scans: usage/grid-scans.md
    - Image Viewer: usage/image-viewer.md
    - Analysis: usage/analysis.md
    - QServer: usage/qserver.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
